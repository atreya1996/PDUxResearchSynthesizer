name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  smoke-test:
    name: Smoke-test imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Assert inline API is available
        run: |
          python - <<'EOF'
          from google.genai import types

          # Verify types.Part.from_bytes exists and accepts the expected args.
          import inspect
          sig = inspect.signature(types.Part.from_bytes)
          params = list(sig.parameters.keys())
          assert "data" in params and "mime_type" in params, (
              f"BREAKING: types.Part.from_bytes signature changed (got {params}). "
              "Update watcher.py and pin the new version in requirements.txt."
          )
          print("types.Part.from_bytes signature OK:", params)
          EOF
      - name: Smoke-test imports
        run: |
          python -c "import watcher; print('watcher imports OK')"
          python -c "import database; print('database imports OK')"
