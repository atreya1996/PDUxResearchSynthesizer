name: Daily Watcher

on:
  schedule:
    - cron: '0 21 * * *'   # 9:00 PM UTC every day
  workflow_dispatch:         # allow manual trigger from GitHub UI

# Prevent two watcher runs overlapping — a second trigger queues behind the
# first rather than running concurrently.  Overlapping runs would download the
# same Drive files twice and write duplicate DB rows before either run archives.
concurrency:
  group: watcher-production
  cancel-in-progress: false

jobs:
  run-watcher:
    runs-on: ubuntu-latest
    # Budget: up to 10 files × 10 min Gemini timeout (_GEMINI_TIMEOUT_MS=600s)
    # = 100 min worst case.  120 min covers a full batch with retry headroom
    # and is well within GitHub Actions' 6-hour hard limit.
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher (one-shot)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          INBOX_FOLDER_ID: ${{ secrets.INBOX_FOLDER_ID }}
          ARCHIVE_FOLDER_ID: ${{ secrets.ARCHIVE_FOLDER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-2.5-flash' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python watcher.py --once

      - name: Upload watcher logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watcher-logs-${{ github.run_id }}
          path: logs/
          if-no-files-found: ignore
