name: Daily Watcher

on:
  schedule:
    - cron: '0 21 * * *'   # 9:00 PM UTC every day
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  run-watcher:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install --force-reinstall google-genai==1.67.0

      - name: Run watcher (one-shot)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          INBOX_FOLDER_ID: ${{ secrets.INBOX_FOLDER_ID }}
          ARCHIVE_FOLDER_ID: ${{ secrets.ARCHIVE_FOLDER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python watcher.py --once

      - name: Upload watcher logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watcher-logs-${{ github.run_id }}
          path: logs/
          if-no-files-found: ignore
